version: '3.8'

services:
  api:
    build: .
    container_name: pinelabs-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://pinelabs:pinelabsadmin1234@db:5432/pinelabs_db
      - ENV=production
      - DEBUG=False
      - LOG_LEVEL=INFO
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  db:
    image: postgres:15-alpine
    container_name: pinelabs-db
    environment:
      - POSTGRES_USER=pinelabs
      - POSTGRES_PASSWORD=pinelabsadmin1234
      - POSTGRES_DB=pinelabs_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinelabs"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: